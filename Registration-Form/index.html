<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration | Frontend Logic Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-wrapper">
        <form id="registrationForm" class="registration-form">
            <h2>Create Account</h2>
            <p class="subtitle">Join our community today</p>

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
                <small class="error-msg" id="usernameError"></small>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email" required>
                <small class="error-msg" id="emailError"></small>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Min. 8 characters" required>
                    <span id="togglePassword" class="toggle-btn">Show</span>
                </div>
                <small class="error-msg" id="passwordError"></small>
            </div>

            <button type="submit" id="submitBtn">Register</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
